<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <style>
    :root { --bg: #1a1b26; --fg: #c0caf5; --accent: #7aa2f7; --dim: #565f89; --green: #9ece6a; --red: #f7768e; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #fff; }
    h2 { font-size: 1.5rem; margin: 2rem 0 0.75rem; color: var(--accent); border-bottom: 1px solid var(--dim); padding-bottom: 0.3rem; }
    h3 { font-size: 1.2rem; margin: 1.5rem 0 0.5rem; color: var(--fg); }
    p { margin: 0.5rem 0; }
    pre { background: #24283b; border-radius: 6px; padding: 1rem; overflow-x: auto; font-size: 0.85rem; line-height: 1.4; margin: 1rem 0; }
    code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.9em; }
    pre code { font-size: 0.85rem; }
    p code { background: #24283b; padding: 0.15em 0.4em; border-radius: 3px; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.9rem; }
    th, td { padding: 0.4rem 0.8rem; text-align: left; border-bottom: 1px solid #2f3549; }
    th { color: var(--accent); font-weight: 600; }
    .hero { text-align: center; padding: 3rem 0 1rem; }
    .hero .subtitle { color: var(--dim); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }
    .badges { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
    .nav { display: flex; gap: 1.5rem; justify-content: center; margin: 1.5rem 0; font-size: 0.95rem; }
    .feature-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .feature-card { background: #24283b; border-radius: 8px; padding: 1rem; }
    .feature-card h3 { margin-top: 0; font-size: 1rem; color: var(--accent); }
    .feature-card p { color: var(--dim); font-size: 0.85rem; }
    footer { margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid #2f3549; color: var(--dim); text-align: center; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
    <footer>
      <a href="{{ config.extra.repo_url }}">GitHub</a> ·
      <a href="https://docs.rs/zenbench">docs.rs</a> ·
      <a href="https://crates.io/crates/zenbench">crates.io</a> ·
      MIT OR Apache-2.0
    </footer>
  </div>
</body>
</html>
